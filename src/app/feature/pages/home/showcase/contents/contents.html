<div class="contents-grid">
  @for (plan of plans; track plan.id) {
    <article class="contents-card" [class.contents-card--featured]="plan.featured">
      @if (plan.featured) {
        <span class="contents-card__badge">人気</span>
      }

      <h3 class="contents-card__name">{{ plan.nameJa }}</h3>
      <p class="contents-card__name-en">{{ plan.nameEn }}</p>

      <p class="contents-card__price">
        <strong>{{ plan.priceLabel }}</strong>円
      </p>
      <p class="contents-card__tax">税込・送料込</p>

      <span class="contents-card__divider" aria-hidden="true"></span>

      <p class="contents-card__volume-label">VOLUME</p>
      <p class="contents-card__volume">{{ plan.volumeLabel }}</p>

      <p class="contents-card__description">{{ plan.description }}</p>

      <p class="contents-card__for">
        <span class="contents-card__for-label">こんな方へ</span>
        {{ plan.forWhom }}
      </p>
    </article>
  }
</div>
