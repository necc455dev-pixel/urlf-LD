<section class="introductions">
  <div class="introductions__inner">
    <div class="introductions__header">
      <span class="introductions__eyebrow">CONCEPT</span>
      <h2 class="introductions__title">語られなかった日々を、<br />一冊の物語に。</h2>
      <p class="introductions__lead">
        喜びも、迷いも、誰かに伝えたかった想いも。<br />
        あなたが歩んできた一日一日を、丁寧に聴き取り、<br />
        世界にひとつの小説として綴ります。
      </p>
    </div>

    <ol class="introductions__steps">
      @for (step of steps; track step.id) {
        <li class="introductions__step">
          <span class="introductions__num">{{ step.id }}</span>
          <h3 class="introductions__step-title">{{ step.title }}</h3>
          <p class="introductions__step-desc">{{ step.description }}</p>
        </li>
      }
    </ol>
  </div>
</section>
