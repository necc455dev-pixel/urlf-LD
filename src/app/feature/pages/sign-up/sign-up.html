<section class="sign-up-page">
  <div class="sign-up-page__layout">
    <section class="sign-up-page__intro surface">
      <div class="sign-up-page__badge">Author onboarding</div>

      <div class="sign-up-page__copy">
        <p class="sign-up-page__eyebrow">Create account</p>
        <h1 class="sign-up-page__title">執筆を始めるためのアカウントを、静かに整える。</h1>
        <p class="sign-up-page__lead">
          読者向けではなく、書き手が迷わず登録を終えられることを優先したサインアップ画面です。
          必要な情報だけを整理して、次の執筆フローへ自然につなぎます。
        </p>
      </div>

      <div class="sign-up-page__points">
        <article class="sign-up-page__point">
          <h2>最小限の入力</h2>
          <p>表示名、ペンネーム、連絡先、執筆者プロフィールだけに絞った登録導線です。</p>
        </article>

        <article class="sign-up-page__point">
          <h2>次工程を見越した設計</h2>
          <p>登録後の確認やオンボーディングに進みやすいよう、状態表示と導線を整理しています。</p>
        </article>
      </div>

      <div class="sign-up-page__footer">
        <p class="sign-up-page__link-row">
          すでに登録済みですか？
          <a routerLink="/login">ログインへ進む</a>
        </p>
      </div>
    </section>

    <div class="sign-up-page__form">
      <urlf-sign-up-form />
    </div>
  </div>
</section>
