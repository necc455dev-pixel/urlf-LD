<section class="terms-page">
        <p class="terms-page__eyebrow">{{ copy.eyebrow }}</p>
      <h1 class="terms-page__title">{{ copy.title }}</h1>
  <div class="terms-page__stack">


    <section class="terms-page__document surface">
      <article class="terms-page__article">
        @for (section of sections; track section.title) {
          <section>
            <h2>{{ section.title }}</h2>
            <p>{{ section.body }}</p>
          </section>
        }

        <p class="terms-page__footer-note">{{ copy.footerNote }}</p>
      </article>
    </section>
        <section class="terms-page__intro surface">
      <div class="terms-page__status">
        <label class="terms-page__checkbox">
          <input type="checkbox" [checked]="agreedToTerms()" (change)="updateAgreement($event)" />
          <span>利用規約を確認し、内容に同意します。</span>
        </label>
      </div>

      <div class="terms-page__actions">
        <button type="button" [disabled]="!canProceed()" (click)="acceptTerms()">
          {{ copy.acceptButtonLabel }}
        </button>
        <a routerLink="/home">{{ copy.backToHomeLabel }}</a>
      </div>
    </section>
  </div>
</section>
