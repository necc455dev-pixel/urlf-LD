<div class="urlf-shell">
  <urlf-side-nav
    [opened]="isSideNavOpen()"
    [items]="navItems"
    title="Navigation"
    (closed)="closeSideNav()"
  />

  <header class="urlf-shell__header">
    <div class="page-shell urlf-shell__header-inner">
      <urlf-bento [opened]="isSideNavOpen()" (pressed)="openSideNav()" />
      <urlf-breadcrumbs />
      <urlf-enrollement-button-bia-google-form [href]="enrollmentFormUrl" label="申し込む" />
      <a
        routerLink="/login"
        class="urlf-shell__icon-action urlf-shell__icon-action--google"
        aria-label="Sign in with Google"
        title="Sign in"
      >
        <img src="/google-signin-mark.svg" alt="" class="urlf-shell__icon-image" />
      </a>
    </div>
  </header>

  <main class="urlf-shell__main">
    <router-outlet />
  </main>
</div>
